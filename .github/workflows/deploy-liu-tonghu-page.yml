name: Deploy Liu Tonghu Landing Page

on:
  push:
    branches: ["main"]
    paths:
      - "liu-tonghu/**"
      - ".github/workflows/deploy-liu-tonghu-page.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare static site
        run: |
          mkdir -p _site
          cp -r liu-tonghu _site/liu-tonghu
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>刘同虎个人网站</title>
              <meta http-equiv="refresh" content="0; url=./liu-tonghu/" />
            </head>
            <body>
              <p>Redirecting to <a href="./liu-tonghu/">刘同虎个人网站</a>...</p>
            </body>
          </html>
          HTML
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
